name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: self-hosted

    env:
      FLASK_APP: backend.main
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE: backend/pet_adoption_website.db

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint Python Code
        run: |
          pylint backend/*.py

      - name: Run Python Unit Tests
        run: |
          python -m pytest backend/test_api.py

      # Frontend pipeline
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Debug:npm & workspace
        run: |
          echo "NODE: $(node --version)"
          echo "NPM:  $(npm --version)"
          echo "Workspace contents:"
          ls -1

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci


      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm run build

      - name: Build Docker Image
        run: |
          docker build -t team29/pet-adopt-api:latest backend/
