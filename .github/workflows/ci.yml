name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: self-hosted

    env:
      FLASK_APP: backend.main
      SECRET_KEY: $({ secrets.SECRET_KEY })
      DATABASE: backend/pet_adoption_website.db

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint Code with pylint
        run: |
          pylint backend/*.py

      - name: Run Unit Tests
        run: |
          python -m pytest backend/test_api.py

      - name: Build Docker Image
        run: |
          docker build -t team29/pet-adopt-api:latest /
